<!DOCTYPE html>
<html lang="en">
<head>
<title>Shaka Player</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/shaka-player@5.0.4/dist/shaka-player.ui.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.0.4/dist/controls.min.css">

<style>
body {
  margin:0;
  background:#000;
  height:100vh;
  overflow:hidden;
}
#video {
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<video id="video" autoplay muted></video>

<script>
async function init() {

const video = document.getElementById('video');

const player = new shaka.Player(video);

const ui = new shaka.ui.Overlay(player, document.body, video);

ui.configure({
  controlPanelElements: [
    'play_pause','time_and_duration','mute','volume',
    'quality','fullscreen'
  ]
});

const streamInfo = {
  url: "https://jiotvmblive.cdn.jio.com/bpk-tv/Star_Sports_HD1_BTS/output/index.mpd",

  clearKeys: {
    "965dc2ddb1d85138ad787999a7f30ca5":
    "859695076e67fe961836b564db6d689c"
  },

  headers: {
    "Cookie":
    "__hdnea__=st=1774866416~exp=1774952816~acl=/*~hmac=965e1a550b5e18fb744cd0de1d8ff04404b14c26c3a9457f82baa3fc37a5d3fe"
  }
};

player.configure({

  drm: {
    clearKeys: streamInfo.clearKeys
  },

  manifest: {
    dash: {
      ignoreMinBufferTime: true
    }
  }

});

// 🔥 Inject Cookie (MOST IMPORTANT)
player.getNetworkingEngine().registerRequestFilter((type, request) => {
  for (let key in streamInfo.headers) {
    request.headers[key] = streamInfo.headers[key];
  }
});

try {
  await player.load(streamInfo.url);
  console.log("Video Playing 🚀");
} catch (e) {
  console.error("Error:", e);
}

}

init();
</script>

</body>
</html>
