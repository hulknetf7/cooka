<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JW Player - Star Sports 1 HD</title>
    <script src="https://ssl.p.jwpcdn.com/7/jwplayer.js"></script>
    
    <style>
        body { margin: 0; background: #000; }
        #jw-container { width: 100vw; height: 100vh; }
        
        /* Video Pro Filters CSS (Jo pehle discuss kiya tha) */
        video.jw-video { filter: contrast(1) saturate(1) brightness(1); }
    </style>
</head>
<body>

<div id="jw-container"></div>

<script>
    // Aapka Data
    const streamData = {
        name: "Star Sports 1 HD",
        link: "https://jiotvmblive.cdn.jio.com//bpk-tv/Star_Sports_HD1_BTS/output/index.mpd",
        cookie: "__hdnea__=st=1774866416~exp=1774952816~acl=/*~hmac=965e1a550b5e18fb744cd0de1d8ff04404b14c26c3a9457f82baa3fc37a5d3fe",
        poster: "https://img.media.jio.com/tvpimages/76/32/301981_1749665664018_l_medium.jpg",
        keyId: "965dc2ddb1d85138ad787999a7f30ca5",
        key: "859695076e67fe961836b564db6d689c"
    };

    // Final URL with Cookie (Auth ke liye zaroori hai)
    const finalUrl = streamData.link + "?" + streamData.cookie;

    const playerInstance = jwplayer("jw-container");

    playerInstance.setup({
        playlist: [{
            title: streamData.name,
            image: streamData.poster,
            sources: [{
                file: finalUrl,
                type: "dash",
                drm: {
                    clearkey: {
                        keyId: streamData.keyId,
                        key: streamData.key
                    }
                }
            }]
        }],
        width: "100%",
        height: "100%",
        autostart: true,
        mute: true,
        cast: {}, // Chromecast support
        sharing: {} 
    });

    // Error handling
    playerInstance.on('setupError', function(e) {
        console.error("JW Setup Error: ", e.message);
    });

    playerInstance.on('error', function(e) {
        console.error("JW Playback Error: ", e.message);
    });
</script>

</body>
</html>
